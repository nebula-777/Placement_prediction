<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Placement | Placement Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            color: white;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .logo span {
            color: #ffd700;
        }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-card h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .form-card p {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .skill-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .skill-checkbox:hover {
            background: #e0e7ff;
        }
        .skill-checkbox input {
            width: auto;
            cursor: pointer;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">Placement<span>Predictor</span></div>
            <a href="index.html" class="back-link">← Back</a>
        </nav>
        
        <div class="form-card">
            <h1>Student Profile</h1>
            <p>Fill in your details to get accurate placement prediction</p>
            
            <div id="statusMessage"></div>
            
            <form id="predictionForm">
                <div class="form-group">
                    <label>📚 CGPA (out of 10)</label>
                    <input type="number" id="cgpa" step="0.01" min="0" max="10" required placeholder="Enter your CGPA">
                </div>
                
                <div class="form-group">
                    <label>💻 Technical Skills</label>
                    <div class="skills-grid" id="technicalSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Python"> Python</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Java"> Java</label>
                        <label class="skill-checkbox"><input type="checkbox" value="JavaScript"> JavaScript</label>
                        <label class="skill-checkbox"><input type="checkbox" value="React"> React</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Node.js"> Node.js</label>
                        <label class="skill-checkbox"><input type="checkbox" value="SQL"> SQL</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Machine Learning"> Machine Learning</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Data Structures"> Data Structures</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🤝 Soft Skills</label>
                    <div class="skills-grid" id="softSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Communication"> Communication</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Teamwork"> Teamwork</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Leadership"> Leadership</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Problem Solving"> Problem Solving</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Adaptability"> Adaptability</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📁 Internships Completed</label>
                        <input type="number" id="internships" min="0" max="5" value="0">
                    </div>
                    <div class="form-group">
                        <label>🚀 Projects Completed</label>
                        <input type="number" id="projects" min="0" max="10" value="0">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📊 Aptitude Score (out of 100)</label>
                    <input type="number" id="aptitudeScore" min="0" max="100" required placeholder="Enter your aptitude test score">
                </div>
                
                <button type="submit" class="btn" id="predictBtn">🔮 Predict Placement Chance</button>
            </form>
        </div>
    </div>
    
    <script>
        // API URL - make sure this is correct
        const API_URL = 'http://localhost:5000/api';
        
        const form = document.getElementById('predictionForm');
        const predictBtn = document.getElementById('predictBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Show loading state
            predictBtn.innerHTML = '⏳ Analyzing with ML Model...';
            predictBtn.disabled = true;
            
            // Clear previous messages
            statusMessage.innerHTML = '';
            
            try {
                // Collect form data
                const studentData = {
                    cgpa: parseFloat(document.getElementById('cgpa').value),
                    technicalSkills: Array.from(document.querySelectorAll('#technicalSkills input:checked')).map(cb => cb.value),
                    softSkills: Array.from(document.querySelectorAll('#softSkills input:checked')).map(cb => cb.value),
                    internships: parseInt(document.getElementById('internships').value) || 0,
                    projects: parseInt(document.getElementById('projects').value) || 0,
                    aptitudeScore: parseInt(document.getElementById('aptitudeScore').value) || 0
                };
                
                // Validate data
                if (isNaN(studentData.cgpa) || studentData.cgpa < 0 || studentData.cgpa > 10) {
                    throw new Error('CGPA must be between 0 and 10');
                }
                
                if (isNaN(studentData.aptitudeScore) || studentData.aptitudeScore < 0 || studentData.aptitudeScore > 100) {
                    throw new Error('Aptitude score must be between 0 and 100');
                }
                
                console.log('📊 Sending data to backend:', studentData);
                
                // Send to backend - FIXED: No space between $ and {
                const response = await fetch(`${API_URL}/prediction/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(studentData)
                });
                
                console.log('Response status:', response.status);
                
                const result = await response.json();
                console.log('📈 API Response:', result);
                
                if (response.ok && result.success) {
                    // Save prediction data to localStorage
                    localStorage.setItem('predictionResult', JSON.stringify(result.prediction));
                    localStorage.setItem('studentData', JSON.stringify(studentData));
                    
                    console.log('✅ Saved to localStorage:', result.prediction);
                    
                    // Show success message
                    statusMessage.innerHTML = '<div class="success-message">✅ Prediction successful! Redirecting...</div>';
                    
                    // Redirect to results page
                    setTimeout(() => {
                        window.location.href = 'result.html';
                    }, 1000);
                    
                } else {
                    throw new Error(result.error || 'Prediction failed');
                }
                
            } catch (error) {
                console.error('❌ Error:', error);
                statusMessage.innerHTML = `<div class="error-message">❌ ${error.message}<br><small>Make sure backend is running on http://localhost:5000</small></div>`;
                predictBtn.innerHTML = '🔮 Predict Placement Chance';
                predictBtn.disabled = false;
            }
        });
        
        // Test backend connection on page load
        async function testBackend() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                console.log('✅ Backend connected:', data);
                statusMessage.innerHTML = '<div class="success-message">✅ Connected to backend server</div>';
                setTimeout(() => {
                    statusMessage.innerHTML = '';
                }, 3000);
            } catch (error) {
                console.error('❌ Backend not reachable:', error);
                statusMessage.innerHTML = '<div class="error-message">⚠️ Backend server not running. Please start the backend with: cd backend && npm start</div>';
            }
        }
        
        testBackend();
    </script>
</body>
</html>
