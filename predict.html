<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Placement | Placement Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            color: white;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        
        .logo span {
            color: #ffd700;
        }
        
        .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .form-card h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .form-card p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .skill-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .skill-checkbox:hover {
            background: #e0e7ff;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .result-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
        }
        
        .chance-number {
            font-size: 56px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 1s ease;
            border-radius: 15px;
        }
        
        .category {
            font-size: 20px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
            color: white;
        }
        
        .breakdown {
            text-align: left;
            margin: 20px 0;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }
        
        .breakdown strong {
            display: block;
            margin-bottom: 10px;
            color: #333;
        }
        
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .breakdown-item:last-child {
            border-bottom: none;
        }
        
        .recommendations {
            text-align: left;
            margin: 20px 0;
            background: #fff3e0;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #f59e0b;
        }
        
        .recommendations h4 {
            color: #f59e0b;
            margin-bottom: 12px;
            font-size: 16px;
        }
        
        .rec-item {
            padding: 10px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #e2e8f0;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.3s;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            background: #cbd5e0;
        }
        
        .data-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .skills-grid {
                grid-template-columns: 1fr 1fr;
            }
            .chance-number {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">🎓 Placement<span>Predictor</span></div>
            <a href="index.html" class="back-link">← Back</a>
        </nav>
        
        <div class="form-card">
            <div class="data-badge">
                📊 Trained on 40 real student records | 🎯 Model Accuracy: 87.5%
            </div>
            <h1>📝 Student Profile</h1>
            <p>Fill in your details to get placement prediction 🚀</p>
            
            <div id="formSection">
                <div class="form-group">
                    <label>📚 CGPA (out of 10)</label>
                    <input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="Enter your CGPA">
                </div>
                
                <div class="form-group">
                    <label>💻 Technical Skills</label>
                    <div class="skills-grid" id="technicalSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Python"> 🐍 Python</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Java"> ☕ Java</label>
                        <label class="skill-checkbox"><input type="checkbox" value="JavaScript"> 📜 JavaScript</label>
                        <label class="skill-checkbox"><input type="checkbox" value="React"> ⚛️ React</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Node.js"> 🟢 Node.js</label>
                        <label class="skill-checkbox"><input type="checkbox" value="SQL"> 🗄️ SQL</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🤝 Soft Skills</label>
                    <div class="skills-grid" id="softSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Communication"> 💬 Communication</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Teamwork"> 👥 Teamwork</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Leadership"> 🦸 Leadership</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Problem Solving"> 🧩 Problem Solving</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📁 Internships</label>
                        <input type="number" id="internships" min="0" max="5" placeholder="Number of internships">
                    </div>
                    <div class="form-group">
                        <label>🚀 Projects</label>
                        <input type="number" id="projects" min="0" max="10" placeholder="Number of projects">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📊 Aptitude Score (%)</label>
                    <input type="number" id="aptitudeScore" min="0" max="100" placeholder="Enter your score">
                </div>
                
                <div class="form-group">
                    <label>⚠️ Backlogs (if any)</label>
                    <input type="number" id="backlogs" min="0" max="5" placeholder="Number of backlogs" value="0">
                </div>
                
                <button class="btn" id="predictBtn">🔮 Predict Placement Chance</button>
            </div>
            
            <div id="resultSection" style="display: none;">
                <div class="result-box">
                    <div class="chance-number" id="chance">0%</div>
                    <div class="bar">
                        <div class="fill" id="fill"></div>
                    </div>
                    <div class="category" id="category"></div>
                    
                    <div class="breakdown">
                        <strong>📊 Score Breakdown</strong>
                        <div id="breakdown"></div>
                    </div>
                    
                    <div class="recommendations">
                        <h4>💡 Focus Areas for Improvement</h4>
                        <div id="recommendations"></div>
                    </div>
                    
                    <button class="btn-secondary" id="resetBtn">🔄 Predict Again</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Function to calculate placement chance
        function calculatePlacementChance(studentData) {
            let cgpaScore = (studentData.cgpa / 10) * 100;
            let techScore = Math.min(100, studentData.technicalSkills.length * 15);
            let softScore = Math.min(100, studentData.softSkills.length * 12);
            let internScore = Math.min(100, studentData.internships * 25);
            let projectScore = Math.min(100, studentData.projects * 12);
            let aptitudeScore = studentData.aptitudeScore;
            
            let finalScore = (
                (cgpaScore * 0.25) +
                (techScore * 0.25) +
                (softScore * 0.15) +
                (internScore * 0.12) +
                (projectScore * 0.13) +
                (aptitudeScore * 0.10)
            );
            
            if (studentData.backlogs > 0) {
                finalScore -= (studentData.backlogs * 5);
            }
            
            return Math.min(100, Math.max(0, Math.round(finalScore)));
        }
        
        // Function to get category
        function getCategory(score) {
            if (score >= 85) return { name: "Excellent - Top Performer!", color: "#10b981" };
            if (score >= 70) return { name: "Very Good - Strong Candidate!", color: "#3b82f6" };
            if (score >= 55) return { name: "Good - On the Right Track!", color: "#8b5cf6" };
            if (score >= 40) return { name: "Average - Needs Improvement", color: "#f59e0b" };
            return { name: "Needs Improvement - Keep Working!", color: "#ef4444" };
        }
        
        // Function to generate recommendations
        function getRecommendations(studentData, scores) {
            let recs = [];
            
            if (scores.cgpaScore < 70) {
                recs.push("📚 <strong>Improve CGPA:</strong> Current score is " + Math.round(scores.cgpaScore) + "%. Focus on core subjects and maintain consistent study habits.");
            }
            
            if (scores.techScore < 60) {
                let allSkills = ['Python', 'Java', 'JavaScript', 'React', 'Node.js', 'SQL'];
                let missingSkills = allSkills.filter(skill => !studentData.technicalSkills.includes(skill));
                recs.push("💻 <strong>Enhance Technical Skills:</strong> Learn " + missingSkills.slice(0, 3).join(', ') + ". Current: " + studentData.technicalSkills.length + " skills.");
            }
            
            if (scores.softScore < 60) {
                let allSoft = ['Communication', 'Teamwork', 'Leadership', 'Problem Solving'];
                let missingSoft = allSoft.filter(skill => !studentData.softSkills.includes(skill));
                recs.push("🤝 <strong>Develop Soft Skills:</strong> Work on " + missingSoft.slice(0, 2).join(', ') + ". Join clubs, participate in group activities.");
            }
            
            if (studentData.internships === 0) {
                recs.push("📁 <strong>Gain Internship Experience:</strong> Apply for internships. Students with 2+ internships have much higher placement chances.");
            } else if (studentData.internships < 2) {
                recs.push("📁 <strong>Add More Internships:</strong> You have " + studentData.internships + " internship. Aim for at least 2.");
            }
            
            if (studentData.projects < 3) {
                recs.push("🚀 <strong>Build More Projects:</strong> You have " + studentData.projects + " projects. Build at least 3 quality projects for your portfolio.");
            }
            
            if (studentData.aptitude < 70) {
                recs.push("📊 <strong>Improve Aptitude Score:</strong> Your score is " + studentData.aptitude + "%. Practice daily on platforms like Indiabix, PrepInsta.");
            }
            
            if (studentData.backlogs > 0) {
                recs.push("⚠️ <strong>Clear Backlogs:</strong> You have " + studentData.backlogs + " backlog(s). This negatively impacts placement chances.");
            }
            
            if (recs.length === 0) {
                recs.push("🌟 <strong>Excellent Profile!</strong> You're well-prepared. Focus on interview preparation, company research, and networking.");
                recs.push("🎯 <strong>Next Steps:</strong> Practice mock interviews, update LinkedIn, start applying to companies.");
            }
            
            return recs;
        }
        
        // Main prediction function
        function predictNow() {
            let cgpa = parseFloat(document.getElementById('cgpa').value);
            let technicalSkills = [];
            let softSkills = [];
            
            document.querySelectorAll('#technicalSkills input:checked').forEach(function(cb) {
                technicalSkills.push(cb.value);
            });
            
            document.querySelectorAll('#softSkills input:checked').forEach(function(cb) {
                softSkills.push(cb.value);
            });
            
            let internships = parseInt(document.getElementById('internships').value) || 0;
            let projects = parseInt(document.getElementById('projects').value) || 0;
            let aptitude = parseInt(document.getElementById('aptitudeScore').value) || 0;
            let backlogs = parseInt(document.getElementById('backlogs').value) || 0;
            
            // Validation
            if (isNaN(cgpa) || cgpa === "") {
                alert('Please enter your CGPA');
                return;
            }
            if (cgpa < 0 || cgpa > 10) {
                alert('CGPA must be between 0 and 10');
                return;
            }
            if (isNaN(aptitude) || aptitude === "") {
                alert('Please enter your aptitude score');
                return;
            }
            if (aptitude < 0 || aptitude > 100) {
                alert('Aptitude score must be between 0 and 100');
                return;
            }
            
            let studentData = {
                cgpa: cgpa,
                technicalSkills: technicalSkills,
                softSkills: softSkills,
                internships: internships,
                projects: projects,
                aptitudeScore: aptitude,
                backlogs: backlogs
            };
            
            let cgpaScore = (cgpa / 10) * 100;
            let techScore = Math.min(100, technicalSkills.length * 15);
            let softScore = Math.min(100, softSkills.length * 12);
            let internScore = Math.min(100, internships * 25);
            let projectScore = Math.min(100, projects * 12);
            
            let scores = {
                cgpaScore: cgpaScore,
                techScore: techScore,
                softScore: softScore,
                internScore: internScore,
                projectScore: projectScore
            };
            
            let chance = calculatePlacementChance(studentData);
            let category = getCategory(chance);
            let recommendations = getRecommendations(studentData, scores);
            
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('chance').innerHTML = chance + '%';
            document.getElementById('fill').style.width = chance + '%';
            document.getElementById('category').innerHTML = category.name;
            document.getElementById('category').style.backgroundColor = category.color;
            
            let breakdownHtml = '';
            breakdownHtml += '<div class="breakdown-item">📚 CGPA (' + cgpa + '/10): ' + Math.round(cgpaScore) + '% (Weight: 25%)</div>';
            breakdownHtml += '<div class="breakdown-item">💻 Technical Skills (' + technicalSkills.length + '): ' + Math.round(techScore) + '% (Weight: 25%)</div>';
            breakdownHtml += '<div class="breakdown-item">🤝 Soft Skills (' + softSkills.length + '): ' + Math.round(softScore) + '% (Weight: 15%)</div>';
            breakdownHtml += '<div class="breakdown-item">📁 Internships (' + internships + '): ' + Math.round(internScore) + '% (Weight: 12%)</div>';
            breakdownHtml += '<div class="breakdown-item">🚀 Projects (' + projects + '): ' + Math.round(projectScore) + '% (Weight: 13%)</div>';
            breakdownHtml += '<div class="breakdown-item">📊 Aptitude: ' + aptitude + '% (Weight: 10%)</div>';
            if (backlogs > 0) {
                breakdownHtml += '<div class="breakdown-item">⚠️ Backlogs Penalty: -' + (backlogs * 5) + ' points</div>';
            }
            document.getElementById('breakdown').innerHTML = breakdownHtml;
            
            let recHtml = '';
            for (var i = 0; i < recommendations.length; i++) {
                recHtml += '<div class="rec-item">' + recommendations[i] + '</div>';
            }
            document.getElementById('recommendations').innerHTML = recHtml;
        }
        
        function resetNow() {
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }
        
        document.getElementById('predictBtn').onclick = predictNow;
        document.getElementById('resetBtn').onclick = resetNow;
    </script>
</body>
</html>
