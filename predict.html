<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Placement | Placement Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            color: white;
        }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #ffd700; }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-card h1 { color: #333; margin-bottom: 10px; }
        .form-card p { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .skill-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .result-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .chance { font-size: 48px; font-weight: bold; color: #667eea; }
        .bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 1s;
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .skills-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">Placement<span>Predictor</span></div>
            <a href="index.html" class="back-link">← Back</a>
        </nav>
        
        <div class="form-card">
            <h1>Student Profile</h1>
            <p>Fill in your details to get placement prediction</p>
            
            <div id="formSection">
                <div class="form-group">
                    <label>📚 CGPA (out of 10)</label>
                    <input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="Enter your CGPA">
                </div>
                
                <div class="form-group">
                    <label>💻 Technical Skills</label>
                    <div class="skills-grid" id="technicalSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Python"> Python</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Java"> Java</label>
                        <label class="skill-checkbox"><input type="checkbox" value="JavaScript"> JavaScript</label>
                        <label class="skill-checkbox"><input type="checkbox" value="React"> React</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Node.js"> Node.js</label>
                        <label class="skill-checkbox"><input type="checkbox" value="SQL"> SQL</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🤝 Soft Skills</label>
                    <div class="skills-grid" id="softSkills">
                        <label class="skill-checkbox"><input type="checkbox" value="Communication"> Communication</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Teamwork"> Teamwork</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Leadership"> Leadership</label>
                        <label class="skill-checkbox"><input type="checkbox" value="Problem Solving"> Problem Solving</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📁 Internships</label>
                        <input type="number" id="internships" min="0" max="5" value="0">
                    </div>
                    <div class="form-group">
                        <label>🚀 Projects</label>
                        <input type="number" id="projects" min="0" max="10" value="0">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📊 Aptitude Score (%)</label>
                    <input type="number" id="aptitudeScore" min="0" max="100" placeholder="Enter your score">
                </div>
                
                <button class="btn" id="predictBtn">🔮 Predict Placement Chance</button>
            </div>
            
            <div id="resultSection" style="display: none;">
                <div class="result-box">
                    <h3>Your Placement Chance</h3>
                    <div class="chance" id="chance">0%</div>
                    <div class="bar"><div class="fill" id="fill"></div></div>
                    <div id="category" style="font-size: 18px; font-weight: bold;"></div>
                    <div id="breakdown" style="margin-top: 20px; text-align: left;"></div>
                    <button class="btn" onclick="resetForm()" style="margin-top: 20px;">Predict Again</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function calculatePlacement() {
            const cgpa = parseFloat(document.getElementById('cgpa').value);
            const technicalSkills = Array.from(document.querySelectorAll('#technicalSkills input:checked')).map(cb => cb.value);
            const softSkills = Array.from(document.querySelectorAll('#softSkills input:checked')).map(cb => cb.value);
            const internships = parseInt(document.getElementById('internships').value);
            const projects = parseInt(document.getElementById('projects').value);
            const aptitudeScore = parseInt(document.getElementById('aptitudeScore').value);
            
            const cgpaScore = (cgpa / 10) * 100;
            const techScore = Math.min(100, technicalSkills.length * 15);
            const softScore = Math.min(100, softSkills.length * 12);
            const internshipScore = Math.min(100, internships * 25);
            const projectScore = Math.min(100, projects * 15);
            const aptitude = aptitudeScore;
            
            const finalScore = (cgpaScore * 0.25 + techScore * 0.30 + softScore * 0.15 + internshipScore * 0.10 + projectScore * 0.10 + aptitude * 0.10);
            
            let category, placementChance;
            if (finalScore >= 85) { category = "Excellent"; placementChance = 95; }
            else if (finalScore >= 70) { category = "Very Good"; placementChance = 85; }
            else if (finalScore >= 55) { category = "Good"; placementChance = 70; }
            else if (finalScore >= 40) { category = "Average"; placementChance = 50; }
            else { category = "Needs Improvement"; placementChance = 30; }
            
            return { placementChance, finalScore: Math.round(finalScore), category, breakdown: { cgpa: Math.round(cgpaScore), technical: Math.round(techScore), softSkills: Math.round(softScore), internships: Math.round(internshipScore), projects: Math.round(projectScore), aptitude: Math.round(aptitude) } };
        }
        
        document.getElementById('predictBtn').addEventListener('click', () => {
            const result = calculatePlacement();
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('chance').textContent = result.placementChance + '%';
            document.getElementById('fill').style.width = result.placementChance + '%';
            document.getElementById('category').textContent = result.category;
            const breakdownDiv = document.getElementById('breakdown');
            breakdownDiv.innerHTML = '<strong>Score Breakdown:</strong><br>' +
                `CGPA: ${result.breakdown.cgpa}%<br>` +
                `Technical Skills: ${result.breakdown.technical}%<br>` +
                `Soft Skills: ${result.breakdown.softSkills}%<br>` +
                `Internships: ${result.breakdown.internships}%<br>` +
                `Projects: ${result.breakdown.projects}%<br>` +
                `Aptitude: ${result.breakdown.aptitude}%`;
        });
        
        function resetForm() {
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
