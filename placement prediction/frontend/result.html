<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result | Placement Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            color: white;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .logo span {
            color: #ffd700;
        }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .result-card h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .gauge {
            margin: 30px 0;
        }
        .chance {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
        }
        .bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 1s ease;
        }
        .category {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }
        .breakdown {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .breakdown h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .breakdown-item:last-child {
            border-bottom: none;
        }
        .recommendations {
            background: #fff3e0;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .recommendations h3 {
            color: #f59e0b;
            margin-bottom: 15px;
        }
        .recommendation-item {
            padding: 12px;
            margin: 10px 0;
            background: white;
            border-radius: 10px;
        }
        .recommendation-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: #5a67d8;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">Placement<span>Predictor</span></div>
            <a href="index.html" class="back-link">← Home</a>
        </nav>
        
        <div class="result-card" id="resultCard">
            <div id="loadingState">
                <h1>Loading Results...</h1>
                <div class="chance" style="font-size: 24px;">Please wait</div>
            </div>
            
            <div id="resultsContent" style="display: none;">
                <h1>🎯 Your Prediction Results</h1>
                
                <div class="gauge">
                    <div class="chance" id="chance">0%</div>
                    <div class="bar">
                        <div class="fill" id="fill"></div>
                    </div>
                    <div class="category" id="category"></div>
                </div>
                
                <div class="breakdown">
                    <h3>📊 Score Breakdown</h3>
                    <div id="breakdown"></div>
                </div>
                
                <div class="recommendations">
                    <h3>💡 Personalized Recommendations</h3>
                    <div id="recommendations"></div>
                </div>
                
                <div class="btn-group">
                    <button class="btn" onclick="window.location.href='predict.html'">🔄 Predict Again</button>
                    <button class="btn btn-secondary" onclick="downloadReport()">📥 Download Report</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Debug: Log what's in localStorage
        console.log('LocalStorage data:', localStorage);
        
        // Get prediction data
        let prediction = null;
        try {
            const storedData = localStorage.getItem('predictionResult');
            console.log('Stored prediction string:', storedData);
            
            if (storedData) {
                prediction = JSON.parse(storedData);
                console.log('Parsed prediction:', prediction);
            }
        } catch (e) {
            console.error('Error parsing prediction:', e);
        }
        
        // Check if prediction exists
        if (!prediction) {
            // No prediction found - show error and redirect
            document.getElementById('loadingState').innerHTML = `
                <div class="error-message">
                    <h2>⚠️ No Prediction Data Found</h2>
                    <p>Please complete the prediction form first.</p>
                    <button class="btn" onclick="window.location.href='predict.html'" style="margin-top: 20px;">
                        Go to Prediction Form
                    </button>
                </div>
            `;
        } else {
            // Hide loading, show results
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'block';
            
            // Display placement chance
            const chance = prediction.placementChance || 0;
            document.getElementById('chance').textContent = chance + '%';
            document.getElementById('fill').style.width = chance + '%';
            
            // Display category
            const categoryElem = document.getElementById('category');
            categoryElem.textContent = prediction.category || 'Not Available';
            categoryElem.style.background = prediction.color || '#667eea';
            categoryElem.style.color = 'white';
            
            // Display breakdown
            const breakdownDiv = document.getElementById('breakdown');
            if (prediction.breakdown) {
                const names = {
                    cgpa: '📚 CGPA',
                    technical: '💻 Technical Skills', 
                    softSkills: '🤝 Soft Skills',
                    internships: '📁 Internships',
                    projects: '🚀 Projects',
                    aptitude: '📊 Aptitude'
                };
                
                for (const [key, value] of Object.entries(prediction.breakdown)) {
                    breakdownDiv.innerHTML += `
                        <div class="breakdown-item">
                            <span><strong>${names[key] || key}</strong></span>
                            <span>${value}%</span>
                        </div>
                    `;
                }
            } else {
                breakdownDiv.innerHTML = '<p>No breakdown data available</p>';
            }
            
            // Display recommendations
            const recDiv = document.getElementById('recommendations');
            if (prediction.recommendations && prediction.recommendations.length > 0) {
                prediction.recommendations.forEach(rec => {
                    recDiv.innerHTML += `
                        <div class="recommendation-item">
                            <strong>${rec.area}</strong>
                            <p>${rec.message}</p>
                            <small style="color: #666;">💡 ${rec.action}</small>
                        </div>
                    `;
                });
            } else {
                recDiv.innerHTML = '<p>Keep up the good work! You\'re on the right track.</p>';
            }
        }
        
        // Download report function
        function downloadReport() {
            const prediction = JSON.parse(localStorage.getItem('predictionResult'));
            const studentData = JSON.parse(localStorage.getItem('studentData') || '{}');
            
            let report = '╔════════════════════════════════════════╗\n';
            report += '║     PLACEMENT PREDICTION REPORT         ║\n';
            report += '╚════════════════════════════════════════╝\n\n';
            report += `Date: ${new Date().toLocaleString()}\n\n`;
            
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += 'PREDICTION RESULTS\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += `Placement Chance: ${prediction.placementChance}%\n`;
            report += `Category: ${prediction.category}\n\n`;
            
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += 'SCORE BREAKDOWN\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            if (prediction.breakdown) {
                for (const [key, value] of Object.entries(prediction.breakdown)) {
                    const names = {cgpa:'CGPA', technical:'Technical Skills', softSkills:'Soft Skills', internships:'Internships', projects:'Projects', aptitude:'Aptitude'};
                    report += `${names[key] || key}: ${value}%\n`;
                }
            }
            
            report += '\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += 'RECOMMENDATIONS\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            if (prediction.recommendations) {
                prediction.recommendations.forEach((rec, i) => {
                    report += `${i+1}. ${rec.area}\n`;
                    report += `   ${rec.message}\n`;
                    report += `   Action: ${rec.action}\n\n`;
                });
            }
            
            const blob = new Blob([report], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `placement_report_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
